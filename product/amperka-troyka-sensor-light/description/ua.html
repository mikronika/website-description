<p>Датчик освітленості з лінійки Troyka-модулей навчить ваш пристрій відрізняти день від ночі, сонячну погоду від похмурої, тінь від світла. З сенсором освітленості вам не доведеться поратися з пайкою, дрібними компонентами на макетці або замислюватися про дільник напруги — все вже готове.</p>
