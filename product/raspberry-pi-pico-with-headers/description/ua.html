<p>Платформа з мікроконтролером RP2040 для розробки електронних пристроїв на мовах MicroPython або C++. Плата буде цікава електронщикам, дизайнерам, програмістам та всім винахідникам, які бажають зібрати власний гаджет від простого робота до системи «Розумний дім».</p>
