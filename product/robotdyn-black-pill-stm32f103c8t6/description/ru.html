<p>Платформа с микроконтроллером STM32F103C8T6 на ядре ARM Cortex-M3 для разработки электронных устройств на языке C++. Плата будет интересна электронщикам, дизайнерам, программистам и всем пытливым умам, желающим собрать собственный гаджет от простого робота до системы «Умный дом».</p>
