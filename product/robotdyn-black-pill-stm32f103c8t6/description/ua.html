<p>Платформа з мікроконтролером STM32F103C8T6 на ядрі ARM Cortex-M3 для розробки електронних пристроїв мовою C++. Плата буде цікава електронщикам, дизайнерам, програмістам та всім винахідникам, які бажають зібрати власний гаджет від простого робота до системи «Розумний дім».</p>
