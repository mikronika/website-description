<p>Чадний газ безбарвний, не має запаху та вкрай токсичний: несправна вентиляція в гаражі, забита пічна труба, тліючі дрова загрожують вам та вашим близьким. Зберіть аварійну сигналізацію високої концентрації CO на основі датчика MQ-7 та зробіть своє життя спокійнішим та безпечнішим.</p>
