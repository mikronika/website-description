<p>Угарный газ бесцветен, не обладает запахом и крайне токсичен: неисправная вентиляция в гараже, забитая печная труба, тлеющие дрова угрожают вам и вашим близким. Соберите аварийную сигнализацию высокой концентрации CO на основе датчика MQ-7 и сделайте свою жизнь спокойнее и безопаснее.</p>
