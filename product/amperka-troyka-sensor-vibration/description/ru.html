<p>Датчик вибрации с выносным пьезоэлементом пригодится для мониторинга тишины от соседей c перфоратором или предупредит о начинающемся землетрясении. А ещё сенсор поможет собрать секретный кодовый замок, повысит надёжность охранной сигнализации и выступит главным судьёй в прыгательной дуэли.</p>
