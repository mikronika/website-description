<p>Датчик вібрації з виносним п'єзоелементом стане в нагоді для моніторингу тиші від сусідів з перфоратором або попередить про початок землетрусу. А ще сенсор допоможе зібрати секретний кодовий замок, підвищить надійність охоронної сигналізації та виступить головним суддею у стрибальній дуелі.</p>
