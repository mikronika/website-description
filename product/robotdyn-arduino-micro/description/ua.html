<p>Платформа з мікроконтролером ATmega32U4 на ядрі AVR для розробки електронних пристроїв мовою C++. Плата буде цікава електронщикам, дизайнерам, програмістам та всім винахідникам, які бажають зібрати власний гаджет від простого робота до системи «Розумний дім».</p>
