<p>Використовуйте джойстик для керування роботами, маніпуляторами, верстатами, машинками, танками, літаками, вертольотами, квадрокоптерами та човнами. Маніпулятор також підійде для створення ігрових приставок та вибору пунктів меню на дисплеях та індикаторах.</p>
