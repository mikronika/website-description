<p>Используйте джойстик для управления роботами, манипуляторами, станками, машинками, танками, самолётами, вертолётами, квадрокоптерами и лодками. Манипулятор также подойдёт для создания игровых приставок и выбора пунктов меню на дисплеях и индикаторах.</p>
