<p>Платформа з мікроконтролером ATmega32U4 на ядрі AVR для розробки мовою С++ та мікропроцесором Atheros AR9331 на Linux. Плата буде цікава електронщикам, дизайнерам, програмістам та всім винахідникам, які бажають зібрати власний гаджет від простого робота до системи «Розумний дім».</p>
