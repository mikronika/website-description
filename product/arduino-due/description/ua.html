<p>Платформа з мікроконтролером AT91SAM3X8E на ядрі ARM Cortex-M3 для разработки электронных устройств на языке C++. Плата буде цікава електронщикам, дизайнерам, програмістам та всім винахідникам, які бажають зібрати власний гаджет від простого робота до системи «Розумний дім».</p>
