<p>Платформа на чіпі U-blox NINA-B306 на базі мікроконтролера Nordic nRF52840 з Wi-Fi / Bluetooth та IMU-сенсором на 9 ступенів свободи. Плата буде цікава електронщикам, дизайнерам, програмістам та всім винахідникам, які бажають зібрати власний гаджет від простого робота до системи «Розумний дім».</p>
