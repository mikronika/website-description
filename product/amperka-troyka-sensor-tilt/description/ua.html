<p>Датчик нахилу з лінійки Troyka-модулів підкаже коли ваш пристрій перекинувся, наприклад на основі сенсора можна зібрати електронний пісочний годинник. З модулем легко почати працювати: не доведеться поратися з пайкою та дрібними компонентами на макетці — все вже готове.</p>
