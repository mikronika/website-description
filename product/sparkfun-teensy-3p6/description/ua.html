<p>Платформа з мікроконтролером NXP MK66FX1M0VMD18 на ядрі ARM Cortex-M4 з частотою 180 МГц для розробки електронних пристроїв. Плата буде цікава електронщикам, дизайнерам, програмістам та всім винахідникам, які бажають зібрати власний гаджет від простого робота до системи «Розумний дім».</p>
