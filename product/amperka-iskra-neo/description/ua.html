<p>Платформа з мікроконтролером ATmega32U4 на ядрі AVR для розробки електронних пристроїв мовою C++. Плата буде цікавою для електронщиків, дизайнерів, програмістів і всім винахідникам, які хочуть зібрати свій власний гаджет від простого робота до системи «Розумний дім».</p>
