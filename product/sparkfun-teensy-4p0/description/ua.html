<p>Платформа з мікроконтролером NXP MIMXRT1062DVL6A на ядрі ARM Cortex-M7 з частотою 600 МГц для розробки електронних пристроїв. Плата буде цікава електронщикам, дизайнерам, програмістам та всім винахідникам, які бажають зібрати власний гаджет від простого робота до системи «Розумний дім».</p>
