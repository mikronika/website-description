<p>Платформа з мікроконтролером NXP MK64FX512VMD12 на ядрі ARM Cortex-M4 з частотою 120 МГц для розробки електронних пристроїв. Плата буде цікава електронщикам, дизайнерам, програмістам та всім винахідникам, які бажають зібрати власний гаджет від простого робота до системи «Розумний дім».</p>
