<p>Хочете подружити платформу Arduino з мобільним телефоном? Візьміть Troyka-модуль Bluetooth HC-05, який допоможе керувати DIY-роботом або моніторити дані домашньої метеостанції через смартфон. А ще Bluetooth може організувати бездротову мережу між двома керуючими платами.</p>
