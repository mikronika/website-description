<p>Модуль годинника реального часу з лінійки Troyka-модулів допоможе вашому пристрою стати пунктуальним та виконувати завдання за розкладом. Годинник вирахує час для подачі їжі з автоматичної годівниці для риб, внесе до графіка перевертання яйця в інкубаторі або запалить ялинку на новий рік.</p>
