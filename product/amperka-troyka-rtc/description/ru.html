<span class="font-family-size-head">
  <p>Модуль часов реального времени из линейки Troyka-модулей поможет вашему устройству стать пунктуальным и выполнять задачи по расписанию. Часы высчитают время для подачи еды из автоматической кормушки для рыб, внесут в график переворачивания яйца в инкубаторе или зажгут ёлку на новый год.</p>
