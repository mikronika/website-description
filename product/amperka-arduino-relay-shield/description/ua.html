<p>Хочете управляти потужним навантаженням та електроприладами за допомогою Arduino? Тоді вам не обійтися без плати розширення Relay Shield, яка зможе керувати чотирма домашніми приладами одночасно. Кожен канал справляється зі струмом до 5 А та змінною напругою до 250 В.</p>
