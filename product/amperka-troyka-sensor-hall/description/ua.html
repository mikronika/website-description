<p>Сенсор Холла зафіксує факт наближення магніту та визначить його полюс. А ще датчик виконає роль тахометра, сенсора відкриття дверей або знайде положення валу при керуванні двигуном без колектора. А з двох датчиків Холла можна зібрати енкодер.</p>
