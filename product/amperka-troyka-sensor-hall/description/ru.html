<span class="font-family-size-head">
  <p>Сенсор Холла зафиксирует факт приближения магнита и определит его полюс. А ещё датчик выполнит роль тахометра, сенсора открытия дверей или найдёт положения вала при управлении бесколлекторным двигателем. А из двух датчиков Холла можно собрать энкодер.</p>
