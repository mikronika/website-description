<p>Скористайтеся ІЧ-приймачем з лінійки Troyka-модулів для управління улюбленим роботом або розумним будинком за допомогою побутового пульту. Модуль звільнить вас від необхідності паяння чи розміщення дрібних компонентів на макетці — все вже готове.</p>
