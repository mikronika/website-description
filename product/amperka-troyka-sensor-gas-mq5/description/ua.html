<p>Датчик MQ-5 допоможе дистанційно моніторити справність газового обладнання заміського будинку, оперативно реєструвати витоки у виробництві та стежити за газобалонним обладнанням. Сенсор розрахований на визначення концентрації пропану, бутану, метану та коксового газу у навколишньому середовищі.</p>
