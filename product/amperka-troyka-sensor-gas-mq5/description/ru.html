<p>Датчик MQ-5 поможет дистанционно мониторить исправность газового оборудования загородного дома, оперативно регистрировать утечки в производстве и следить за газобаллонным оборудованием. Сенсор рассчитан на определение концентрации пропана, бутана, метана и коксового газа в окружающей среде.</p>
