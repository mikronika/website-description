<p>Захисний кейс з ABS-пластику з вирізами під периферію для збереження мікрокомп'ютерів Raspberry Pi всіх сімейств Zero від механічних пошкоджень, пилу та бризок води. У комплекті три верхні кришки: без вирізів, з вирізом під GPIO-піни вводу-виводу та вирізом під шлейф для MIPI-камери.</p>
