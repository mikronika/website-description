<p>Використовуйте потенціометр з лінійки Troyka-модулів для плавного регулювання будь-яким параметром, наприклад яскравості світлодіода чи швидкості мотору. З модулем формату Troyka вам не доведеться поратися з пайкою або дрібними компонентами на макетній платі — все вже готове.</p>
