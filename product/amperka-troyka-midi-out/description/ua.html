<p>Компактний MIDI-вихід перетворить мікроконтролер на лазерну арфу, синтезатор треків для 8-бітних ігор або оригінальну драм-машину. Модуль дозволяє підключати саморобні пристрої до професійного звукового та сценічного обладнання за інтерфейсом MIDI.</p>
