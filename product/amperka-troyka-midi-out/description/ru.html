<p>Компактный MIDI-выход превратит микроконтроллер в лазерную арфу, синтезатор треков для 8-битных игр или оригинальную драм-машину. Модуль позволяет подключать самодельные устройства к профессиональному звуковому и сценическому оборудованию по интерфейсу MIDI.</p>
