<p>RFID/NFC сканер стане в нагоді при створенні розумного будинку, в системах обліку товару на складі та в охоронній системі з різними видами допуску. Модуль допоможе зчитувати та записувати інформацію з NFC-міток, виступати в якості NFC пристрою та навіть імітувати мітку.</p>
