<p>RFID/NFC сканер пригодится при создании умного дома, в системах учёта товара на складе и в охранной системе с разными видами допуска. Модуль поможет считывать и записывать информацию с NFC-меток, выступать в качестве NFC устройства и даже имитировать метку.</p>
