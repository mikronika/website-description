<p>Керуюча платформа Arduino — це електронний мозок для створення власного девайсу. Контролер керує всією периферією та обробляє показання датчиків у реальному часі. Платформа Ардуіно завоювала популярність, тому що підходить для тих, хто не володіє знаннями в електроніці.</p>
