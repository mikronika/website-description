<p>Сенсори рідини потрібні для розширення додаткових можливостей Arduino, Raspberry Pi, Espruino, micro:bit та інших контролерів. Датчики навчать контролери спілкуватися з акво стихією, наприклад: вимірювати рівень води в баку, витрати води в трубах, кислотність рідини та мінералізацію води.</p>
