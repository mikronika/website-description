<p>Сенсоры жидкости служат для расширения дополнительных возможностей Arduino, Raspberry Pi, Espruino, micro:bit и других контроллеров. Датчики научат контроллеры общаться с акво стихией, например: измерять уровень воды в баке, расход воды в трубах, кислотность жидкости и минерализацию воды.</p>
