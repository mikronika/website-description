<p>Керуючі платформи Espruino — потужний і компактний аналог Arduino, що програмується мовою JavaScript. Контролер потрібен для керування всією периферією і обробляє показання датчиків у реальному часі. Контролери Espruino є ідеальним варіантом для WEB-програмістів.</p>
