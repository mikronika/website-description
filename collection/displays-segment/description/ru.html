<p>Сегментные дисплеи — это индикаторные экраны для отображения цифр, символов и простой информации с Arduino, Raspberry Pi, Espruino, micro:bit и других контроллеров. Сегментные дисплеи часто используются для вывода даты, времени, температуры и других индикаторных показаний.</p>
