<p>Сегментні дисплеї — це індикаторні екрани для відображення цифр, символів та простої інформації з Arduino, Raspberry Pi, Espruino, micro:bit та інших контролерів. Сегментні дисплеї часто використовуються для виведення дати, часу, температури та інших індикаторних показників.</p>
