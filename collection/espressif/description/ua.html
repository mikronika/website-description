<p>Керуючі платформи на чіпах ESP8266 і ESP32 — головна деталь в електронному пристрої для створення власного девайсу. Контролер потрібен для керування всією периферією і обробляє показання датчиків у реальному часі. Головна особливість платформ ESP8266/ESP32 — вбудований бездротовий модуль Wi-Fi.</p>
