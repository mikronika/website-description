<span class="font-family-size-head">
  <p>Raspberry Pi — популярний одноплатний міні-комп'ютер «малина» розміром із кредитну картку. Малинка має досить потужну начинку, щоб замінити настільний ПК початкового рівня. Комп'ютери Raspberry Pi працюють на Linux та підтримують USB-пристрої, дисплеї, камери та іншу периферію.</p>
</span>
