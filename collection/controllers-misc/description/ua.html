<p>Контролер та одноплатний комп'ютер — це керуючі плати з електронним мозком для створення власного девайсу. Керуюча плата керує всією периферією, обробляє показання датчиків та видає результат. У цьому розділі зібрані плати, які є унікальними та не увійшли до жодної зі штатних категорій.</p>
